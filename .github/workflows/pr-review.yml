name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  id-token: write

concurrency:
  group: pr-review-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Job 1: Automatic review on PR open/sync (automation mode)
  # ──────────────────────────────────────────────────────────────────────────────
  review:
    name: Octocode PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load Octocode review protocol
        run: |
          PROTOCOL_ROOT="skills/octocode-pull-request-reviewer"
          FILES="SKILL.md references/dependency-check.md references/flow-analysis-protocol.md references/review-guidelines.md references/domain-reviewers.md references/execution-lifecycle.md references/parallel-agent-protocol.md references/output-template.md references/verification-checklist.md"
          > /tmp/review-protocol.md
          for f in $FILES; do
            SOURCE_PATH="$PROTOCOL_ROOT/$f"
            if [ ! -f "$SOURCE_PATH" ]; then
              echo "ERROR: Missing protocol file $SOURCE_PATH"
              exit 1
            fi
            printf '\n---\n# SOURCE: %s\n---\n' "$f" >> /tmp/review-protocol.md
            cat "$SOURCE_PATH" >> /tmp/review-protocol.md
          done

      - name: Write MCP config
        run: |
          cat > /tmp/mcp-config.json << 'MCPEOF'
          {
            "mcpServers": {
              "octocode": {
                "command": "npx",
                "args": ["-y", "octocode-mcp@latest"],
                "env": {
                  "GITHUB_TOKEN": "${{ github.token }}",
                  "ENABLE_LOCAL": "true"
                }
              }
            }
          }
          MCPEOF

      - name: Record review start time
        id: review-start
        run: |
          echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Normalize workflow file for Claude validation
        run: |
          BASE_BRANCH="${{ github.event.repository.default_branch }}"
          if ! git rev-parse --verify --quiet "origin/${BASE_BRANCH}" >/dev/null; then
            git fetch --no-tags --depth=1 origin "refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}" || true
          fi

          if git rev-parse --verify --quiet "origin/${BASE_BRANCH}" >/dev/null; then
            if ! git diff --quiet "origin/${BASE_BRANCH}...HEAD" -- .github/workflows/pr-review.yml; then
              git checkout "origin/${BASE_BRANCH}" -- .github/workflows/pr-review.yml
              echo "::notice::Workflow file normalized from origin/${BASE_BRANCH} to satisfy claude-code-action validation."
            fi
          else
            echo "::warning::Could not resolve origin/${BASE_BRANCH}; proceeding without workflow normalization."
          fi

      - name: Run Octocode PR Review
        id: review-agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: "actions: read"
          display_report: "true"
          classify_inline_comments: "true"
          include_fix_links: "true"
          exclude_comments_by_actor: "*[bot]"
          prompt: |
            You are Octocode — an evidence-first expert code reviewer.
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            The pull request merge ref is already checked out in the current working directory.

            ## Step 1: Load Review Protocol (REQUIRED)

            Read `/tmp/review-protocol.md` — the full Octocode PR Review skill with flow analysis
            recipes, domain reviewers, output templates, and verification checklists.
            Internalize the protocol, then execute the CI flow below.

            ## Step 2: CI Execution Flow

            Execute these phases sequentially. Do NOT pause for user input at any phase.

            ### Phase 1 — Auto-Discover Guidelines
            Search the repo for project guidelines (do NOT ask the user):
            - `.octocode/pr-guidelines.md`
            - `.octocode/context/context.md`
            - `CONTRIBUTING.md`, `AGENTS.md`
            Use `localFindFiles` or `Glob`. Read any found files and use them as review criteria.

            ### Phase 2 — Full Context Scan
            1. Fetch PR metadata: `githubSearchPullRequests(prNumber=${{ github.event.pull_request.number }}, type="metadata")` with `owner="${{ github.repository_owner }}"` and `repo="${{ github.event.repository.name }}"`
            2. Fetch existing PR comments with `withComments=true` — note resolved vs open comments
            3. Get the diff: `gh pr diff ${{ github.event.pull_request.number }}`
            4. **Check CI/CD status (best effort)**:
               - If `mcp__github_ci__*` tools are available, use them for pipeline status and logs.
               - If they are unavailable, continue the review and explicitly mark CI status as "not available via tool".
               Factor any available CI evidence into the review.
            5. Classify risk: HIGH (auth/API/data/schema) / MEDIUM / LOW (docs/config)
            6. Group changed files by functional area
            7. PR health: description quality, size (flag >500 lines), linked issues, test coverage

            ### Phase 3 — Skip (CI mode)
            Proceed with FULL review across ALL domains. No user interaction.

            ### Phase 4 — Deep Analysis (ALL tools)
            Apply the protocol's funnel: `localSearchCode → lineHint → LSP tools → localGetFileContent`

            **Flow Impact (REQUIRED for every modified function/method/type):**
            - `localSearchCode(pattern="symbolName")` → get lineHint (NEVER guess)
            - `lspCallHierarchy(direction="incoming")` → find callers, assess breakage
            - `lspFindReferences` → all usages of changed types/interfaces
            - `lspGotoDefinition` → verify type contracts at boundaries
            - Document blast radius per the protocol's tracing recipes

            **Review ALL domains from the protocol** (Bug, Architecture, Security, Performance,
            Code Quality, Error Handling, Flow Impact), PLUS these additional lenses:
            - **Efficiency**: redundant passes, duplicate fetches, unnecessary complexity
            - **UX & Accessibility**: broken states, missing feedback, accessibility regressions
            - **Data & Migration Safety**: schema drift, incompatible payloads, data loss
            - **Reliability & Ops**: missing timeouts, retry storms, unsafe rollouts
            - **Testing**: missing tests for changed contracts, untested error paths
            - **CI Impact**: does the change break or skip existing CI checks?

            **Cross-cutting checks:**
            - `packageSearch` for new/updated external dependencies
            - `githubSearchCode` to check if changed exports are consumed elsewhere
            - Scan for TODO/FIXME in new code ('+' lines only)
            - Security: injection, XSS, secret exposure, auth bypass, unsafe defaults
            - If CI failed: correlate failures with the PR's changes — are they caused by this PR?

            ### Phase 5 — Finalize
            - Cross-check findings against existing PR comments — do NOT duplicate
            - Flag still-open previous review comments as unresolved
            - Keep only HIGH/MED confidence findings with actionable code fixes
            - Cap at ~7 most impactful issues, ordered by severity
            - Use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`
              for the strongest line-specific findings
            - Each finding: `file:line`, confidence (HIGH/MED), problem, diff-format fix

            ### Phase 6 — Submit Review (READ-ONLY — comments only, no code changes)
            For line-specific issues, prefer inline review comments and avoid duplicating the same
            wording in the final summary.
            Submit the review using `gh pr review` with `--body` and a heredoc. Example:
            ```
            gh pr review ${{ github.event.pull_request.number }} --approve --body "$(cat <<'REVIEWEOF'
            <review body here>
            REVIEWEOF
            )"
            ```
            Use exactly ONE of `--approve`, `--request-changes`, or `--comment`.

            ## Review Body Structure

            ```
            ## Octocode PR Review

            ### Executive Summary
            | Aspect | Value |
            |--------|-------|
            | **Risk Level** | HIGH / MEDIUM / LOW — reasoning |
            | **Recommendation** | APPROVE / REQUEST_CHANGES / COMMENT |
            | **CI Status** | ✅ Passing / ❌ Failing (details) / ⏳ Pending |

            ### Ratings
            | Aspect | Score |
            |--------|-------|
            | Correctness | X/5 |
            | Security | X/5 |
            | Performance | X/5 |
            | Maintainability | X/5 |

            ### PR Health
            - [ ] Clear description
            - [ ] References ticket/issue
            - [ ] Appropriate size
            - [ ] Relevant tests
            - [ ] CI passing

            ### Findings

            #### [SEVERITY] #N: Title
            **Location:** `path:line` | **Confidence:** HIGH/MED
            Problem description and impact.
            ```diff
            - current code
            + suggested fix
            ```

            ### Flow Impact
            Modified symbols and their affected callers/consumers.

            ### CI Analysis
            Summary of CI/CD status and any failures related to this PR.

            ### Previous Review Comments
            Status of prior comments (resolved / still open).
            ```

            ## Verdict Rules
            - **APPROVE**: Default when no blocking issues found and CI is green.
            - **REQUEST_CHANGES**: Blocking bugs, security flaws, breaking changes, or CI failures caused by the PR.
            - **COMMENT**: Non-blocking suggestions and improvements.

            ## Hard Rules
            - APPROVE by default unless a real, evidence-backed problem is found.
            - Focus ONLY on changed code ('+' lines in the diff).
            - Skip generated files, lock files, vendored code.
            - Do NOT flag style/formatting (linter handles that).
            - Trivial PRs (docs, config, <5 lines): approve with brief note.
            - Every finding MUST cite a specific file:line.
            - ALWAYS use `localSearchCode` BEFORE any LSP tool to obtain lineHint.
            - Check existing PR comments FIRST — avoid duplicates, flag unresolved ones.
            - Check CI status — include it in the executive summary.
            - For high-confidence line-specific issues, prefer
              `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`.
            - Be concise. Evidence over opinion. No filler.
            - Submit exactly one `gh pr review` verdict. Do NOT use `gh pr comment`.
            - You are READ-ONLY. Do NOT edit, write, or modify any repository files.
          claude_args: |
            --max-turns 25
            --mcp-config /tmp/mcp-config.json
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,mcp__octocode__localSearchCode,mcp__octocode__localGetFileContent,mcp__octocode__localViewStructure,mcp__octocode__localFindFiles,mcp__octocode__lspGotoDefinition,mcp__octocode__lspFindReferences,mcp__octocode__lspCallHierarchy,mcp__octocode__githubSearchPullRequests,mcp__octocode__githubGetFileContent,mcp__octocode__githubSearchCode,mcp__octocode__githubViewRepoStructure,mcp__octocode__packageSearch,Bash(gh pr diff:*),Bash(gh pr review:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git status:*),Read,Glob"
            --disallowedTools "Edit,Write,Replace,MultiEdit,NotebookEditCell,Bash(git push:*),Bash(git commit:*),Bash(git add:*),Bash(git checkout:*),Bash(git branch:*),Bash(git rebase:*),Bash(git merge:*),Bash(git cherry-pick:*),Bash(gh pr create:*),Bash(gh pr merge:*),Bash(gh pr close:*),Bash(gh pr edit:*),Bash(gh repo:*)"
        env:
          MCP_TIMEOUT: "90000"
          MCP_TOOL_TIMEOUT: "45000"

      - name: Check review verdict
        env:
          GH_TOKEN: ${{ steps.review-agent.outputs.github_token || github.token }}
        run: |
          START_TS="${{ steps.review-start.outputs.ts }}"
          REVIEWER_LOGIN=$(gh api user --jq .login)
          REVIEW_ID=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            --jq "([.[] | select(.user.login == \"$REVIEWER_LOGIN\" and .state != \"DISMISSED\" and (.submitted_at // \"\") >= \"$START_TS\")] | last | .id) // \"NONE\"")
          VERDICT=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            --jq "([.[] | select(.user.login == \"$REVIEWER_LOGIN\" and .state != \"DISMISSED\" and (.submitted_at // \"\") >= \"$START_TS\")] | last | .state) // \"NONE\"")
          echo "Reviewer login: $REVIEWER_LOGIN"
          echo "Review start time: $START_TS"
          echo "Fresh review id: $REVIEW_ID"
          echo "Review verdict: $VERDICT"
          if [ "$REVIEW_ID" = "NONE" ]; then
            echo "::error::Octocode did not submit a fresh review"
            exit 1
          fi
          if [ "$VERDICT" = "NONE" ]; then
            echo "::error::Octocode review verdict is missing"
            exit 1
          fi
          if [ "$VERDICT" = "CHANGES_REQUESTED" ]; then
            echo "::error::Octocode requested changes — see review comments"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 2: Interactive review on @octocode comment (interactive mode)
  # ──────────────────────────────────────────────────────────────────────────────
  comment-review:
    name: Octocode Comment Review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@octocode') &&
      !contains(github.event.comment.body, '@octocode dismiss') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve PR checkout target
        id: comment-pr-head
        run: |
          PR_API="repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}"
          HEAD_REPO=$(gh api "$PR_API" --jq '.head.repo.full_name // empty')
          HEAD_SHA=$(gh api "$PR_API" --jq '.head.sha // empty')
          if [ "$HEAD_REPO" = "${{ github.repository }}" ] && [ -n "$HEAD_SHA" ]; then
            echo "repository=$HEAD_REPO" >> "$GITHUB_OUTPUT"
            echo "ref=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "repository=${{ github.repository }}" >> "$GITHUB_OUTPUT"
            echo "ref=refs/pull/${{ github.event.issue.number }}/merge" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ steps.comment-pr-head.outputs.repository }}
          ref: ${{ steps.comment-pr-head.outputs.ref }}

      - name: Load Octocode review protocol
        run: |
          PROTOCOL_ROOT="skills/octocode-pull-request-reviewer"
          FILES="SKILL.md references/dependency-check.md references/flow-analysis-protocol.md references/review-guidelines.md references/domain-reviewers.md references/execution-lifecycle.md references/parallel-agent-protocol.md references/output-template.md references/verification-checklist.md"
          > /tmp/review-protocol.md
          for f in $FILES; do
            SOURCE_PATH="$PROTOCOL_ROOT/$f"
            if [ ! -f "$SOURCE_PATH" ]; then
              echo "ERROR: Missing protocol file $SOURCE_PATH"
              exit 1
            fi
            printf '\n---\n# SOURCE: %s\n---\n' "$f" >> /tmp/review-protocol.md
            cat "$SOURCE_PATH" >> /tmp/review-protocol.md
          done

      - name: Write MCP config
        run: |
          cat > /tmp/mcp-config.json << 'MCPEOF'
          {
            "mcpServers": {
              "octocode": {
                "command": "npx",
                "args": ["-y", "octocode-mcp@latest"],
                "env": {
                  "GITHUB_TOKEN": "${{ github.token }}",
                  "ENABLE_LOCAL": "true"
                }
              }
            }
          }
          MCPEOF

      - name: Record review start time
        id: comment-review-start
        run: |
          echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Normalize workflow file for Claude validation
        run: |
          BASE_BRANCH="${{ github.event.repository.default_branch }}"
          if ! git rev-parse --verify --quiet "origin/${BASE_BRANCH}" >/dev/null; then
            git fetch --no-tags --depth=1 origin "refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}" || true
          fi

          if git rev-parse --verify --quiet "origin/${BASE_BRANCH}" >/dev/null; then
            if ! git diff --quiet "origin/${BASE_BRANCH}...HEAD" -- .github/workflows/pr-review.yml; then
              git checkout "origin/${BASE_BRANCH}" -- .github/workflows/pr-review.yml
              echo "::notice::Workflow file normalized from origin/${BASE_BRANCH} to satisfy claude-code-action validation."
            fi
          else
            echo "::warning::Could not resolve origin/${BASE_BRANCH}; proceeding without workflow normalization."
          fi

      - name: Run Octocode Interactive Review
        id: comment-review-agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@octocode"
          additional_permissions: "actions: read"
          display_report: "true"
          classify_inline_comments: "true"
          include_fix_links: "true"
          track_progress: "true"
          exclude_comments_by_actor: "*[bot]"
          prompt: |
            You are Octocode — an evidence-first expert code reviewer.
            Review PR #${{ github.event.issue.number }} in ${{ github.repository }}.
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}
            The pull request head revision is already checked out in the current working directory.

            ## Instructions

            Read `/tmp/review-protocol.md` for the full review protocol and use Octocode MCP tools for deep analysis.

            Treat an `@octocode` pull request comment as a request for a full re-review unless the
            comment explicitly asks for a narrower follow-up. If the comment asks something specific,
            focus on that scope while still checking surrounding context.

            ### Context Gathering
            1. Fetch PR metadata and existing comments (note resolved vs open)
            2. Get the full diff: `gh pr diff ${{ github.event.issue.number }}`
            3. **Check CI/CD status (best effort)**:
               - If `mcp__github_ci__*` tools are available, use them for pipeline status and logs.
               - If they are unavailable, continue the review and explicitly mark CI status as "not available via tool".
               Factor any available CI evidence into the review.
            4. Auto-discover project guidelines (`.octocode/pr-guidelines.md`, `CONTRIBUTING.md`, `AGENTS.md`)

            ### Deep Analysis
            Use the protocol's full funnel: `localSearchCode → lineHint → LSP tools → localGetFileContent`
            - Trace flow impact for every modified function/method/type
            - Check callers with `lspCallHierarchy(direction="incoming")`
            - Check all usages with `lspFindReferences`
            - Verify type contracts with `lspGotoDefinition`
            - Check new dependencies with `packageSearch`
            - Correlate CI failures with PR changes

            ### Output
            - Avoid duplicating existing PR comments — flag unresolved ones
            - Use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`
              for the strongest line-specific findings
            - Include CI status in the executive summary
            - Submit exactly one final verdict with `gh pr review`, do NOT use `gh pr comment`
            - Use `gh pr review` with `--body` and a heredoc (no file writing needed). Example:
              ```
              gh pr review ${{ github.event.issue.number }} --approve --body "$(cat <<'REVIEWEOF'
              <review body here>
              REVIEWEOF
              )"
              ```
            - You are READ-ONLY. Do NOT edit, write, or modify any repository files.
          claude_args: |
            --max-turns 25
            --mcp-config /tmp/mcp-config.json
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,mcp__octocode__localSearchCode,mcp__octocode__localGetFileContent,mcp__octocode__localViewStructure,mcp__octocode__localFindFiles,mcp__octocode__lspGotoDefinition,mcp__octocode__lspFindReferences,mcp__octocode__lspCallHierarchy,mcp__octocode__githubSearchPullRequests,mcp__octocode__githubGetFileContent,mcp__octocode__githubSearchCode,mcp__octocode__githubViewRepoStructure,mcp__octocode__packageSearch,Bash(gh pr diff:*),Bash(gh pr review:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git status:*),Read,Glob"
            --disallowedTools "Edit,Write,Replace,MultiEdit,NotebookEditCell,Bash(git push:*),Bash(git commit:*),Bash(git add:*),Bash(git checkout:*),Bash(git branch:*),Bash(git rebase:*),Bash(git merge:*),Bash(git cherry-pick:*),Bash(gh pr create:*),Bash(gh pr merge:*),Bash(gh pr close:*),Bash(gh pr edit:*),Bash(gh repo:*)"
        env:
          MCP_TIMEOUT: "90000"
          MCP_TOOL_TIMEOUT: "45000"

      - name: Check review verdict
        env:
          GH_TOKEN: ${{ steps.comment-review-agent.outputs.github_token || github.token }}
        run: |
          PR=${{ github.event.issue.number }}
          START_TS="${{ steps.comment-review-start.outputs.ts }}"
          REVIEWER_LOGIN=$(gh api user --jq .login)
          REVIEW_ID=$(gh api "repos/${{ github.repository }}/pulls/${PR}/reviews" \
            --jq "([.[] | select(.user.login == \"$REVIEWER_LOGIN\" and .state != \"DISMISSED\" and (.submitted_at // \"\") >= \"$START_TS\")] | last | .id) // \"NONE\"")
          VERDICT=$(gh api "repos/${{ github.repository }}/pulls/${PR}/reviews" \
            --jq "([.[] | select(.user.login == \"$REVIEWER_LOGIN\" and .state != \"DISMISSED\" and (.submitted_at // \"\") >= \"$START_TS\")] | last | .state) // \"NONE\"")
          echo "Reviewer login: $REVIEWER_LOGIN"
          echo "Review start time: $START_TS"
          echo "Fresh review id: $REVIEW_ID"
          echo "Review verdict: $VERDICT"
          if [ "$REVIEW_ID" = "NONE" ]; then
            echo "::error::Octocode did not submit a fresh review"
            exit 1
          fi
          if [ "$VERDICT" = "NONE" ]; then
            echo "::error::Octocode review verdict is missing"
            exit 1
          fi
          if [ "$VERDICT" = "CHANGES_REQUESTED" ]; then
            echo "::warning::Octocode requested changes — see review comments"
          fi

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3: Dismiss review on @octocode dismiss comment
  # ──────────────────────────────────────────────────────────────────────────────
  dismiss-review:
    name: Dismiss Octocode Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@octocode dismiss') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Dismiss latest Octocode review
        run: |
          PR=${{ github.event.issue.number }}
          REVIEWER_LOGIN=$(gh api user --jq .login)
          REVIEW_ID=$(gh api "repos/${{ github.repository }}/pulls/${PR}/reviews" \
            --jq "([.[] | select(.user.login == \"$REVIEWER_LOGIN\" and .state != \"DISMISSED\" and ((.body // \"\") | contains(\"## Octocode PR Review\")))] | last | .id) // \"NONE\"")
          if [ -n "$REVIEW_ID" ] && [ "$REVIEW_ID" != "null" ] && [ "$REVIEW_ID" != "NONE" ]; then
            gh api "repos/${{ github.repository }}/pulls/${PR}/reviews/${REVIEW_ID}/dismissals" \
              -X PUT -f message="Dismissed by ${{ github.event.comment.user.login }} via @octocode dismiss"
            gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
              -f content="+1"
            echo "Dismissed review $REVIEW_ID by $REVIEWER_LOGIN"
          else
            echo "No active Octocode review found to dismiss for reviewer $REVIEWER_LOGIN"
            gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
              -f content="confused"
          fi
